services:
  # Python FastAPI Backend
  - type: web
    name: ai-lighting-api
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn services.api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: API_HOST
        value: "0.0.0.0"
      - key: API_PORT
        sync: false
        value: "$PORT"
    healthCheckPath: /health
    autoDeploy: true

  # React Frontend
  - type: web
    name: ai-lighting-ui
    runtime: node
    buildCommand: "cd ui && npm install && npm run build"
    staticPublishPath: ./ui/dist
    envVars:
      - key: NODE_VERSION
        value: "18"
      # You'll need to set this to your backend URL after deploying
      - key: VITE_API_URL
        value: "https://ai-lighting-api.onrender.com"
    routes:
      - type: rewrite
        source: /api/*
        destination: https://ai-lighting-api.onrender.com/*
    autoDeploy: true
