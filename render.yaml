services:
  # Python FastAPI Backend
  - type: web
    name: ai-lighting-api
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn services.api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: API_HOST
        value: "0.0.0.0"
    healthCheckPath: /health
    autoDeploy: true

  # React Frontend (Static Site)
  - type: web
    name: ai-lighting-ui
    runtime: static
    buildCommand: "cd ui && npm install && npm run build"
    staticPublishPath: ./ui/dist
    envVars:
      - key: NODE_VERSION
        value: "18"
      # Update this to your actual backend URL after deploying the API
      # Format: https://your-api-name.onrender.com (no trailing slash, no /api)
      - key: VITE_API_URL
        value: "https://ai-lighting-api.onrender.com"
    autoDeploy: true
